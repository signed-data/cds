name: Release MCP Servers

on:
  push:
    tags:
      - 'mcp-lottery-v*'
      - 'mcp-finance-v*'
      - 'mcp-commodities-v*'
      - 'mcp-companies-v*'
      - 'mcp-gov-br-v*'
  workflow_dispatch:
    inputs:
      server:
        description: MCP server to release
        required: true
        type: choice
        options:
          - lottery
          - finance
          - commodities
          - companies
          - gov-br

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: 3.13

jobs:
  determine-server:
    name: Determine target server
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.extract.outputs.server }}
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract server from tag or input
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Extract from tag: mcp-lottery-v0.1.0 → lottery, 0.1.0
            TAG="${{ github.ref_name }}"
            if [[ $TAG =~ ^mcp-([a-z-]+)-v(.+)$ ]]; then
              SERVER="${BASH_REMATCH[1]}"
              VERSION="${BASH_REMATCH[2]}"
            fi
          else
            # From workflow_dispatch input
            SERVER="${{ github.event.inputs.server }}"
            VERSION=$(grep "^version" mcp/${SERVER}/pyproject.toml | cut -d'"' -f2)
          fi
          echo "server=${SERVER}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Server: ${SERVER}, Version: ${VERSION}"

  publish-pypi:
    name: Publish ${{ needs.determine-server.outputs.server }} to PyPI
    needs: determine-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/${{ needs.determine-server.outputs.server }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/${{ needs.determine-server.outputs.server }}/dist/

  publish-docker:
    name: Publish ${{ needs.determine-server.outputs.server }} to Docker Hub
    needs: determine-server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: mcp/${{ needs.determine-server.outputs.server }}
          push: true
          tags: |
            signeddata/mcp-${{ needs.determine-server.outputs.server }}:latest
            signeddata/mcp-${{ needs.determine-server.outputs.server }}:v${{ needs.determine-server.outputs.version }}
