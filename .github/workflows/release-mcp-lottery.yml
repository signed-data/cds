name: Release mcp-lottery

on:
  push:
    tags:
      - "sdk-py-v*"
      - "mcp-lottery-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-mcp-lottery-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-and-publish-pypi:
    name: Publish lottery package to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: python -m pip install --upgrade build pip

      - name: Build signeddata-cds wheel
        run: python -m build sdk/python

      - name: Build signeddata-mcp-lottery wheel
        run: python -m build mcp/lottery

      - name: Verify install from built distributions
        run: |
          python -m venv .venv-release
          . .venv-release/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links sdk/python/dist --find-links mcp/lottery/dist signeddata-mcp-lottery
          python -m cds_mcp_lottery mega-sena --help

      - name: Smoke start stdio server
        run: |
          . .venv-release/bin/activate
          timeout 5s python -m cds_mcp_lottery mega-sena >/tmp/mcp-lottery-smoke.log 2>&1
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat /tmp/mcp-lottery-smoke.log
            exit "$status"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/lottery/dist/

  build-and-publish-docker:
    name: Publish Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-publish-pypi

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: signeddata/mcp-lottery
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/lottery/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
